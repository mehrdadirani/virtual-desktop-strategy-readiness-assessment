<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Virtual Desktop Strategy & Readiness Assessment</title>
  <meta http-equiv="refresh" content="0; url=./Virtual-Desktop-Strategy-Readiness-Assessment.html" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --ink: #152033;
      --muted: #667085;
      --brand: #ff6b00;
      --line: #e5e7eb;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #fff 0, var(--bg) 100%);
      color: var(--ink);
      font-family: Inter, system-ui, sans-serif;
      padding: 24px;
    }

    .card {
      max-width: 640px;
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
    }

    .badge {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,107,0,.1);
      color: #9a3412;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    h1 {
      margin: 14px 0 10px;
      font-size: 30px;
      line-height: 1.08;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      color: var(--brand);
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">Interactive Assessment</span>
    <h1>Opening Virtual Desktop Strategy & Readiness Assessment</h1>
    <p>If you are not redirected automatically, open the assessment below.</p>
    <a href="./Virtual-Desktop-Strategy-Readiness-Assessment.html">Launch the assessment</a>
  </main>
</body>
</html>
